<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ストレッチ・ボディケア 競合マップ</title>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Helvetica Neue', 'Noto Sans JP', sans-serif; }
  #map { width: 100%; height: 100vh; }

  .legend {
    background: rgba(255,255,255,0.95);
    padding: 14px 18px;
    border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    font-size: 12px;
    line-height: 1.8;
    max-width: 260px;
  }
  .legend h4 {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 6px;
    color: #1a2444;
    border-bottom: 2px solid #eee;
    padding-bottom: 4px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 4px;
    transition: background 0.15s;
  }
  .legend-item:hover {
    background: rgba(0,0,0,0.05);
  }
  .legend-item.active {
    background: rgba(201,168,76,0.15);
  }
  .legend-item.dimmed {
    opacity: 0.3;
  }
  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 2px solid rgba(0,0,0,0.2);
  }
  .legend-divider {
    height: 1px;
    background: #eee;
    margin: 6px 0;
  }
  .legend-section {
    font-size: 10px;
    font-weight: 700;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
  }

  .blank-zone-label {
    background: rgba(201, 168, 76, 0.9);
    color: #fff;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }

  .store-popup { font-size: 12px; line-height: 1.6; }
  .store-popup strong { font-size: 13px; }
  .store-popup .brand { color: #888; font-size: 11px; }

  .layer-control {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 1000;
    background: rgba(255,255,255,0.95);
    padding: 12px 16px;
    border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    font-size: 12px;
  }

  /* 商圏内店舗パネル */
  .nearby-panel {
    position: absolute;
    top: 10px;
    right: 200px;
    z-index: 999;
    background: rgba(255,255,255,0.97);
    padding: 0;
    border-radius: 8px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.18);
    font-size: 12px;
    max-height: calc(100vh - 40px);
    overflow-y: auto;
    width: 300px;
    display: none;
  }
  .nearby-panel.visible { display: block; }
  .nearby-panel-header {
    position: sticky;
    top: 0;
    background: #1a2444;
    color: #fff;
    padding: 10px 14px;
    font-size: 12px;
    font-weight: 700;
    border-radius: 8px 8px 0 0;

  .nearby-store-group {
    padding: 10px 14px;
    border-bottom: 1px solid #eee;
  }
  .nearby-store-group:last-child { border-bottom: none; }
  .nearby-store-title {
    font-size: 13px;
    font-weight: 700;
    color: #1a2444;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .nearby-store-title .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .nearby-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 3px 0;
    color: #444;
    line-height: 1.4;
  }
  .nearby-item .item-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .nearby-item .item-name { font-weight: 500; }
  .nearby-item .item-dist {
    margin-left: auto;
    color: #999;
    font-size: 10px;
    flex-shrink: 0;
  }
  .nearby-empty {
    color: #aaa;
    font-style: italic;
    padding: 3px 0;
  }

  @media (max-width: 768px) {
    .layer-control {
      top: auto;
      bottom: 10px;
      right: 10px;
      padding: 8px 12px;
      font-size: 11px;
      max-width: 180px;
    }
    .layer-control h4 { font-size: 11px; margin-bottom: 6px; }
    .layer-control label { margin-bottom: 2px; }
    .layer-control input[type="checkbox"] { width: 16px; height: 16px; }

    .legend {
      max-width: 220px;
      padding: 10px 14px;
      font-size: 11px;
      line-height: 1.6;
    }
    .legend h4 { font-size: 11px; }
    .legend-section { font-size: 9px; }
    .legend-dot { width: 10px; height: 10px; }

    .nearby-panel {
      position: fixed;
      top: auto;
      bottom: 0;
      left: 0;
      right: 0;
      width: 100%;
      max-height: 45vh;
      border-radius: 14px 14px 0 0;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.2);

    .nearby-panel-header {
      border-radius: 14px 14px 0 0;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nearby-panel-header::after {
      content: '';
      position: absolute;
      top: 6px;
      left: 50%;
      transform: translateX(-50%);
      width: 36px;
      height: 4px;
      background: rgba(255,255,255,0.4);
      border-radius: 2px;
    }
    .nearby-store-group { padding: 8px 14px; }
    .nearby-store-title { font-size: 12px; }
    .nearby-item { font-size: 11px; }

    .blank-zone-label { font-size: 10px; padding: 3px 8px; }

    font-size: 12px;
    font-weight: 700;
    margin-bottom: 8px;
    color: #1a2444;
  }
  .layer-control label {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
    cursor: pointer;
  }
  .layer-control input[type="checkbox"] {
    width: 14px;
    height: 14px;
  }

  { name: 'ほぐしま専科 近江八幡店', brand: 'ほぐしま専科', note: '2,980円/60分 / 滋賀', lat: 35.1295, lng: 136.0954 },
  { name: 'ほぐしま専科 八日市店', brand: 'ほぐしま専科', note: '2,980円/60分 / 滋賀', lat: 35.1039, lng: 136.2146 },

  { name: 'ほぐしま専科 大津瀬田店', brand: 'ほぐしま専科', note: '2,980円/60分 / 滋賀', lat: 34.9725, lng: 135.9094 },

const brandColors = {
  rstretch: '#c9a84c', drstretch: '#d32f2f', otherStretch: '#ff8f00',
  rirakuru: '#7cb342', raffine: '#5c6bc0', otherBodycare: '#26a69a',
  candidateYamashina: '#c9a84c', candidateOtsu: '#c9a84c',
};

// 候補エリア定義（商圏半径がブランドと異なる）
const candidateAreas = {
  candidateYamashina: { label: '候補: 山科', lat: 34.970, lng: 135.822, radiusM: 2500 },
  candidateOtsu: { label: '候補: 大津', lat: 35.005, lng: 135.868, radiusM: 4000 },
};

const allStoresIndex = [
  ...rstretchStores.map(s => ({ ...s, brandKey: 'rstretch', label: 'Rストレッチ ' + s.name })),
  ...drstretchStores.map(s => ({ ...s, brandKey: 'drstretch', label: 'Dr.Stretch ' + s.name })),
  ...otherStretchStores.map(s => ({ ...s, brandKey: 'otherStretch', label: s.name })),
  ...rirakuruStores.map(s => ({ ...s, brandKey: 'rirakuru', label: s.name })),
  ...raffineStores.map(s => ({ ...s, brandKey: 'raffine', label: s.name })),
  ...otherBodycareStores.map(s => ({ ...s, brandKey: 'otherBodycare', label: s.name })),
];

function haversineKm(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ========== LAYER GROUPS ==========
const rstretchLayer = L.layerGroup();
const drstretchLayer = L.layerGroup();
const otherStretchLayer = L.layerGroup();
const rirakuruLayer = L.layerGroup();

const blankLayer = L.layerGroup();
const radiusLayer = L.layerGroup();

// ブランド別の商圏円を管理
const brandCircles = {

  drstretch: [],
  otherStretch: [],
  rirakuru: [],
  raffine: [],
  otherBodycare: [],
  candidateYamashina: [],
  candidateOtsu: [],
};

// ========== ADD MARKERS ==========

// 他ボディケアチェーン
otherBodycareStores.forEach(s => {

  brandCircles.otherBodycare.push(c);
});

// ========== BLANK ZONES ==========
// 山科
const yamashimaCircle = L.circle([34.970, 135.822], {
  radius: 2500, color: '#c9a84c', fillColor: '#c9a84c',

// 大津

otsuCircle.addTo(blankLayer);
brandCircles.candidateOtsu.push(otsuCircle);
L.marker([35.005, 135.868], {
  icon: L.divIcon({

  })

// ========== ADD ALL TO MAP ==========
[rstretchLayer, drstretchLayer, otherStretchLayer, rirakuruLayer, raffineLayer, otherBodycareLayer, blankLayer, radiusLayer].forEach(l => l.addTo(map));

// ========== LEGEND ==========
const legend = L.control({ position: 'bottomleft' });
legend.onAdd = function() {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = `
    <h4>競合マップ <span style="font-size:10px;font-weight:400;color:#999;">クリックで商圏ハイライト</span></h4>
    <div class="legend-section">ストレッチ専門店</div>
    <div class="legend-item" data-brand="rstretch"><div class="legend-dot" style="background:#c9a84c;"></div> Rストレッチ（4店舗）</div>
    <div class="legend-item" data-brand="drstretch"><div class="legend-dot" style="background:#d32f2f;"></div> Dr.Stretch（8店舗）</div>
    <div class="legend-item" data-brand="otherStretch"><div class="legend-dot" style="background:#ff8f00;"></div> 他ストレッチ専門（13店舗）</div>
    <div class="legend-divider"></div>
    <div class="legend-section">ボディケアチェーン（間接競合）</div>
    <div class="legend-item" data-brand="rirakuru"><div class="legend-dot" style="background:#7cb342;"></div> りらくる（11店舗）</div>
    <div class="legend-item" data-brand="raffine"><div class="legend-dot" style="background:#5c6bc0;"></div> ラフィネ（19店舗）</div>
    <div class="legend-item" data-brand="otherBodycare"><div class="legend-dot" style="background:#26a69a;"></div> 他ボディケア（37店舗）</div>
    <div class="legend-divider"></div>
    <div class="legend-section">出店候補エリア（クリックで圏内店舗表示）</div>
    <div class="legend-item" data-brand="candidateYamashina"><div class="legend-dot" style="background:transparent; border:2.5px dashed #c9a84c;"></div> 山科（半径2.5km）</div>
    <div class="legend-item" data-brand="candidateOtsu"><div class="legend-dot" style="background:transparent; border:2.5px dashed #c9a84c;"></div> 大津（半径4km）</div>
  `;

  // 凡例クリックで商圏円をハイライト（複数選択対応）
  const activeBrands = new Set();

  const defaultStyles = {
    rstretch:      { fillOpacity: 0.06, weight: 1.5 },
    drstretch:     { fillOpacity: 0.04, weight: 1 },
    otherStretch:  { fillOpacity: 0.04, weight: 1 },
    rirakuru:      { fillOpacity: 0.04, weight: 1 },
    raffine:       { fillOpacity: 0.04, weight: 1 },
    otherBodycare: { fillOpacity: 0.03, weight: 0.8 },
    candidateYamashina: { fillOpacity: 0.12, weight: 2.5 },
    candidateOtsu:      { fillOpacity: 0.12, weight: 2.5 },
  };

  // ブランドキー → 表示用の店舗配列マッピング
  const brandStoresMap = {
    rstretch: rstretchStores.map(s => ({ ...s, label: 'Rストレッチ ' + s.name })),
    drstretch: drstretchStores.map(s => ({ ...s, label: 'Dr.Stretch ' + s.name })),
    otherStretch: otherStretchStores.map(s => ({ ...s, label: s.name })),
    rirakuru: rirakuruStores.map(s => ({ ...s, label: s.name })),
    raffine: raffineStores.map(s => ({ ...s, label: s.name })),
    otherBodycare: otherBodycareStores.map(s => ({ ...s, label: s.name })),
  };

  function updateNearbyPanel() {
    const panel = document.getElementById('nearbyPanel');
    const content = document.getElementById('nearbyContent');

    if (activeBrands.size === 0) {
      panel.classList.remove('visible');
      content.innerHTML = '';
      return;
    }

    let html = '';
    activeBrands.forEach(selectedBrand => {
      // 候補エリアの場合
      const cand = candidateAreas[selectedBrand];
      if (cand) {
        const radiusKm = cand.radiusM / 1000;
        const nearby = allStoresIndex
          .map(s => ({ ...s, dist: haversineKm(cand.lat, cand.lng, s.lat, s.lng) }))
          .filter(s => s.dist <= radiusKm)
          .sort((a, b) => a.dist - b.dist);

        html += `<div class="nearby-store-group">`;
        html += `<div class="nearby-store-title"><div class="dot" style="background:${brandColors[selectedBrand]}; border:2px dashed rgba(0,0,0,0.3);"></div>${cand.label}（半径${radiusKm}km圏内）</div>`;
        if (nearby.length === 0) {
          html += `<div class="nearby-empty">圏内に競合なし</div>`;
        } else {
          nearby.forEach(n => {
            const distStr = n.dist < 1 ? Math.round(n.dist * 1000) + 'm' : n.dist.toFixed(1) + 'km';
            html += `<div class="nearby-item"><div class="item-dot" style="background:${brandColors[n.brandKey]};"></div><span class="item-name">${n.label}</span><span class="item-dist">${distStr}</span></div>`;
          });
        }
        html += `</div>`;
        return;
      }

      // 通常ブランドの場合
      const stores = brandStoresMap[selectedBrand];
      if (!stores) return;
      stores.forEach(store => {
        const nearby = allStoresIndex
          .filter(s => s.brandKey !== selectedBrand)
          .map(s => ({ ...s, dist: haversineKm(store.lat, store.lng, s.lat, s.lng) }))
          .filter(s => s.dist <= 3.0)
          .sort((a, b) => a.dist - b.dist);

        html += `<div class="nearby-store-group">`;
        html += `<div class="nearby-store-title"><div class="dot" style="background:${brandColors[selectedBrand]};"></div>${store.label}</div>`;
        if (nearby.length === 0) {
          html += `<div class="nearby-empty">3km圏内に競合なし</div>`;
        } else {
          nearby.forEach(n => {
            const distStr = n.dist < 1 ? Math.round(n.dist * 1000) + 'm' : n.dist.toFixed(1) + 'km';
            html += `<div class="nearby-item"><div class="item-dot" style="background:${brandColors[n.brandKey]};"></div><span class="item-name">${n.label}</span><span class="item-dist">${distStr}</span></div>`;
          });
        }
        html += `</div>`;
      });
    });

    content.innerHTML = html;
    panel.classList.add('visible');
  }

  function updateCircleStyles() {
    const allItems = div.querySelectorAll('.legend-item[data-brand]');

    if (activeBrands.size === 0) {
      Object.keys(brandCircles).forEach(brand => {
        const s = defaultStyles[brand];
        brandCircles[brand].forEach(c => c.setStyle({ fillOpacity: s.fillOpacity, weight: s.weight }));
      });
      allItems.forEach(el => { el.classList.remove('active'); el.classList.remove('dimmed'); });
    } else {
      Object.keys(brandCircles).forEach(brand => {
        if (activeBrands.has(brand)) {
          brandCircles[brand].forEach(c => c.setStyle({ fillOpacity: 0.25, weight: 3 }));
        } else {
          brandCircles[brand].forEach(c => c.setStyle({ fillOpacity: 0.02, weight: 0.5 }));
        }
      });
      allItems.forEach(el => {
        if (activeBrands.has(el.dataset.brand)) {
          el.classList.add('active');
          el.classList.remove('dimmed');
        } else {
          el.classList.remove('active');
          el.classList.add('dimmed');
        }
      });
    }

    updateNearbyPanel();
  }

  div.querySelectorAll('.legend-item[data-brand]').forEach(item => {
    L.DomEvent.disableClickPropagation(item);
    item.addEventListener('click', function() {
      const brand = this.dataset.brand;
      if (activeBrands.has(brand)) {
        activeBrands.delete(brand);
      } else {
        activeBrands.add(brand);
      }
      updateCircleStyles();
    });
  });

  return div;
};
legend.addTo(map);

// ========== TOGGLE CONTROLS ==========
document.getElementById('toggleRstretch').addEventListener('change', function() {
  this.checked ? map.addLayer(rstretchLayer) : map.removeLayer(rstretchLayer);
});
document.getElementById('toggleStretch').addEventListener('change', function() {
  if (this.checked) {
    map.addLayer(drstretchLayer);
    map.addLayer(otherStretchLayer);
  } else {
    map.removeLayer(drstretchLayer);
    map.removeLayer(otherStretchLayer);
  }
});
document.getElementById('toggleBodycare').addEventListener('change', function() {
  if (this.checked) {
    map.addLayer(rirakuruLayer);
    map.addLayer(raffineLayer);
    map.addLayer(otherBodycareLayer);
  } else {
    map.removeLayer(rirakuruLayer);
    map.removeLayer(raffineLayer);
    map.removeLayer(otherBodycareLayer);
  }
});
document.getElementById('toggleBlanks').addEventListener('change', function() {
  this.checked ? map.addLayer(blankLayer) : map.removeLayer(blankLayer);
});
document.getElementById('toggleRadius').addEventListener('change', function() {
  this.checked ? map.addLayer(radiusLayer) : map.removeLayer(radiusLayer);
});
</script>
